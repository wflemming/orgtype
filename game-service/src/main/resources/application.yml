spring:
  application:
    name: game-service

server:
  port: 8082

org-service:
  url: ${ORG_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

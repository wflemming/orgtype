apiVersion: apps/v1
kind: Deployment
metadata:
  name: org-service
  namespace: orgtype
  labels:
    app: org-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: org-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: org-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/management/prometheus"
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: org-service
          image: orgtype-org-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: orgtype-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: orgtype-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: orgtype-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: orgtype-config
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASS
          startupProbe:
            httpGet:
              path: /management/health
              port: 8081
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /management/health
              port: 8081
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /management/health
              port: 8081
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

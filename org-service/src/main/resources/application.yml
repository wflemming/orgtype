spring:
  application:
    name: org-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orgtype}
    username: ${DB_USER:orgtype}
    password: ${DB_PASS:orgtype}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081

management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
